<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskDocs AI — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <!-- Theme must load FIRST to prevent flash -->
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">

<div class="auth-scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="auth-split">
        <!-- Left panel -->
        <div class="auth-brand">
            <div class="brand-inner">
                <div class="brand-mark">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <rect width="48" height="48" rx="14" fill="url(#brandGrad2)"/>
                        <path d="M14 16h20M14 24h14M14 32h8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="36" cy="32" r="6" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
                        <path d="M33.5 32h5M36 29.5v5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="brandGrad2" x1="0" y1="0" x2="48" y2="48">
                                <stop stop-color="#6366f1"/>
                                <stop offset="1" stop-color="#8b5cf6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="brand-name">AskDocs <span>AI</span></h1>
                <p class="brand-tagline">Join thousands querying smarter.</p>

                <div class="brand-steps">
                    <div class="step-item">
                        <div class="step-num">01</div>
                        <div class="step-text">Create your account</div>
                    </div>
                    <div class="step-item">
                        <div class="step-num">02</div>
                        <div class="step-text">Upload your PDFs</div>
                    </div>
                    <div class="step-item">
                        <div class="step-num">03</div>
                        <div class="step-text">Ask anything, instantly</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right panel — form -->
        <div class="auth-form-panel">
            <div class="auth-card">
                <div class="auth-card-header">
                    <h2>Create account</h2>
                    <p>Start querying your documents with AI</p>
                </div>

                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>

                <div class="field-group">
                    <label for="username">Username</label>
                    <div class="field-wrap">
                        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <input type="text" id="username" placeholder="Choose a username"/>
                    </div>
                </div>

                <div class="field-group">
                    <label for="email">Email address</label>
                    <div class="field-wrap">
                        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M2 8l10 6 10-6" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <input type="email" id="email" placeholder="you@example.com"/>
                    </div>
                </div>

                <div class="field-group">
                    <label for="password">Password</label>
                    <div class="field-wrap">
                        <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <input type="password" id="password" placeholder="Min. 8 characters"/>
                    </div>
                </div>

                <button class="btn-auth" id="registerBtn" onclick="handleRegister()">
                    <span class="btn-text">Create Account</span>
                    <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>

                <div class="auth-divider"><span>Already have an account?</span></div>

                <a href="/login" class="btn-secondary-auth">Sign in instead</a>

                <!-- Theme toggle on login page -->
                <button class="theme-toggle auth-theme-btn" onclick="toggleTheme()" title="Toggle theme">
                    <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none">
                        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <svg class="icon-rose" width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2C8 2 5 5 5 8c0 4 4 7 7 10 3-3 7-6 7-10 0-3-3-6-7-6z" fill="url(#rg2)"/>
                        <defs>
                            <linearGradient id="rg2" x1="5" y1="2" x2="19" y2="18">
                                <stop stop-color="#f43f5e"/>
                                <stop offset="1" stop-color="#fb923c"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
